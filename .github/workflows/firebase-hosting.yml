# Firebase Hosting 자동 배포 워크플로우
name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - claude/explore-local-files-011CUkG4z3Rkw62W9TsBH124

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd plasma-sim
          npm install

      - name: Build
        run: |
          cd plasma-sim
          npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLASMA_SIMULATOR }}'
          channelId: live
          projectId: plasma-simulator
